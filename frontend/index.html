<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сучасна Пекарня</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍞</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    #app-loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #FAF6F1; font-family: 'Jost', sans-serif; z-index: 9999;
    }
    #app-loading .spinner {
      width: 48px; height: 48px; border: 4px solid #e8d9c0;
      border-top-color: #8B5E3C; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }
    #app-loading p { color: #8B5E3C; font-size: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app-error {
      display: none; position: fixed; inset: 0;
      align-items: center; justify-content: center;
      background: #FAF6F1; flex-direction: column;
      font-family: 'Jost', sans-serif; padding: 24px; z-index: 9999;
    }
    #app-error h2 { color: #c0392b; margin-bottom: 12px; }
    #app-error pre {
      background: #fff; border: 1px solid #ddd; border-radius: 8px;
      padding: 16px; font-size: 0.8rem; max-width: 700px;
      white-space: pre-wrap; word-break: break-all; color: #333;
    }
  </style>
</head>
<body>
  <!-- Індикатор завантаження -->
  <div id="app-loading">
    <div class="spinner"></div>
    <p>Завантаження Сучасна Пекарня...</p>
  </div>

  <!-- Блок помилки -->
  <div id="app-error">
    <h2>❌ Помилка запуску застосунку</h2>
    <pre id="app-error-text"></pre>
    <p style="color:#888;margin-top:12px">Відкрий DevTools (F12) → Console для деталей</p>
  </div>

  <div id="root"></div>

  <!-- Перехоплення глобальних помилок -->
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('app-loading').style.display = 'none';
      var el = document.getElementById('app-error');
      el.style.display = 'flex';
      document.getElementById('app-error-text').textContent =
        (err ? err.toString() : msg) + '\n\nФайл: ' + src + '\nРядок: ' + line;
    };
    window.addEventListener('unhandledrejection', function(e) {
      document.getElementById('app-loading').style.display = 'none';
      var el = document.getElementById('app-error');
      el.style.display = 'flex';
      document.getElementById('app-error-text').textContent =
        'Promise rejected:\n' + (e.reason ? e.reason.toString() : 'Unknown error');
    });
    // Прибрати спінер якщо React змонтувався
    window.__appReady = function() {
      document.getElementById('app-loading').style.display = 'none';
    };
    // Timeout — якщо за 10с React не запустився
    setTimeout(function() {
      var loading = document.getElementById('app-loading');
      if (loading.style.display !== 'none') {
        loading.style.display = 'none';
        var el = document.getElementById('app-error');
        el.style.display = 'flex';
        document.getElementById('app-error-text').textContent =
          'Timeout: React не запустився за 10 секунд.\n\nМожливі причини:\n' +
          '1. CDN скрипти не завантажились (немає інтернету)\n' +
          '2. Синтаксична помилка в index.js\n' +
          '3. Babel не зміг обробити JSX\n\nВідкрий F12 → Console для деталей.';
      }
    }, 10000);
  </script>

  <!-- React + Babel без збірки -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="agent.js"></script>
  <script type="text/babel" src="index.js"></script>
</body>
</html>
